# ─── go-drp GitLab CI/CD ──────────────────────────────────────────────────────
#
# Pipeline stages:
#   test    → run tests + race detector on every commit
#   build   → cross-compile binaries and upload to Generic Packages (tag only)
#   release → create a GitLab Release with download links   (tag only)
#
# Trigger a release by pushing a semver tag:
#   git tag v1.0.0 && git push origin v1.0.0

stages:
  - test
  - build
  - release

variables:
  APP_NAME: go-drp
  GO_VERSION: "1.22"
  CGO_ENABLED: "0"
  GOFLAGS: "-trimpath"

# ─── TEST ─────────────────────────────────────────────────────────────────────
test:
  stage: test
  image: golang:${GO_VERSION}-alpine
  before_script:
    # gcc + musl required for the -race detector on alpine
    - apk add --no-cache gcc musl-dev git
  script:
    - go vet ./...
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    reports:
      # Cobertura coverage report visible in MR widget.
      # Requires gocover-cobertura: go install github.com/boumenot/gocover-cobertura@latest
      # Uncomment the lines below and add the conversion step to the script if desired.
      # coverage_report:
      #   coverage_format: cobertura
      #   path: coverage.xml
    paths:
      - coverage.out
    expire_in: 1 week

# ─── BUILD ────────────────────────────────────────────────────────────────────
# Build one binary per platform, then upload each to the Generic Packages
# Registry so they can be linked in the release.

.build_template: &build_template
  stage: build
  image: golang:${GO_VERSION}
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl
  script:
    - |
      EXT=""
      [ "${GOOS}" = "windows" ] && EXT=".exe"
      OUTPUT="${APP_NAME}-${GOOS}-${GOARCH}${EXT}"
      echo "Building ${OUTPUT} (version=${CI_COMMIT_TAG:-dev}) ..."
      GOOS=${GOOS} GOARCH=${GOARCH} \
        go build ${GOFLAGS} \
          -ldflags "-X main.version=${CI_COMMIT_TAG:-dev} -w -s" \
          -o "${OUTPUT}" .
      echo "Uploading ${OUTPUT} to Generic Packages Registry ..."
      curl --silent --show-error --fail \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file "${OUTPUT}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${OUTPUT}"
  rules:
    - if: $CI_COMMIT_TAG

build:linux-amd64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: amd64

build:linux-arm64:
  <<: *build_template
  variables:
    GOOS: linux
    GOARCH: arm64

build:darwin-amd64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: amd64

build:darwin-arm64:
  <<: *build_template
  variables:
    GOOS: darwin
    GOARCH: arm64

build:windows-amd64:
  <<: *build_template
  variables:
    GOOS: windows
    GOARCH: amd64

# ─── RELEASE ──────────────────────────────────────────────────────────────────
# Creates a GitLab Release with links to the binaries uploaded above.
release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build:linux-amd64
    - build:linux-arm64
    - build:darwin-amd64
    - build:darwin-arm64
    - build:windows-amd64
  script:
    - echo "Creating GitLab Release for ${CI_COMMIT_TAG}"
  release:
    name: "${APP_NAME} ${CI_COMMIT_TAG}"
    tag_name: "${CI_COMMIT_TAG}"
    description: |
      ## ${APP_NAME} ${CI_COMMIT_TAG}

      A secure dynamic reverse proxy gateway.

      ### Download

      | Platform   | Arch  | Binary                                   |
      |------------|-------|------------------------------------------|
      | Linux      | amd64 | `go-drp-linux-amd64`                     |
      | Linux      | arm64 | `go-drp-linux-arm64`                     |
      | macOS      | amd64 | `go-drp-darwin-amd64`                    |
      | macOS      | arm64 | `go-drp-darwin-arm64` *(Apple Silicon)*  |
      | Windows    | amd64 | `go-drp-windows-amd64.exe`               |

      ### Quick start (Linux amd64)

      ```bash
      curl -LO "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/go-drp/${CI_COMMIT_TAG}/go-drp-linux-amd64"
      chmod +x go-drp-linux-amd64
      export PROXY_TOKEN="your-secret-token"
      ./go-drp-linux-amd64
      ```
    assets:
      links:
        - name: "go-drp-linux-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${APP_NAME}-linux-amd64"
          link_type: package
        - name: "go-drp-linux-arm64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${APP_NAME}-linux-arm64"
          link_type: package
        - name: "go-drp-darwin-amd64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${APP_NAME}-darwin-amd64"
          link_type: package
        - name: "go-drp-darwin-arm64"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${APP_NAME}-darwin-arm64"
          link_type: package
        - name: "go-drp-windows-amd64.exe"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/${APP_NAME}/${CI_COMMIT_TAG}/${APP_NAME}-windows-amd64.exe"
          link_type: package
  rules:
    - if: $CI_COMMIT_TAG
